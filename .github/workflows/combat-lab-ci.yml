name: Combat Lab CI

on:
  push:
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: combat-lab-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, Static Test, Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Show tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Set build hash from git commit
        run: echo "BUILD_HASH=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Phaser import boundary check
        run: |
          echo "Checking src/combat/ for Phaser imports..."
          if grep -rq "from ['\"]phaser" src/combat/ || grep -rq "import.*phaser" src/combat/; then
            echo "FAIL: Phaser import found in src/combat/ — kernel must remain Phaser-free"
            grep -rn "phaser" src/combat/
            exit 1
          fi
          echo "OK: No Phaser imports in combat kernel"

      - name: Enforce velocity write locations
        run: |
          echo "Checking velocity writes only in allowed files..."
          ALLOWED="ActorFactory\.ts|CombatKernel\.ts|ReactionResolver\.ts|EnemyAI\.ts"
          VIOLATIONS=$(grep -rn "\.velocity\s*[.=]" src/combat/ --include="*.ts" | grep -vE "$ALLOWED" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "FAIL: velocity writes found outside allowed files:"
            echo "$VIOLATIONS"
            echo ""
            echo "Allowed files (pre-E-segment):"
            echo "  - ActorFactory.ts (initialization)"
            echo "  - CombatKernel.ts updateReactionMotion() (physics)"
            echo "  - ReactionResolver.ts apply() (launch/stagger/knockback)"
            exit 1
          fi
          echo "OK: All velocity writes in allowed files"
          grep -rn "\.velocity\s*[.=]" src/combat/ --include="*.ts" || echo "  (none found)"

      - name: Validate sprite sheets
        run: npm run validate:sprites

      - name: Validate asset manifest consistency
        run: npm run validate:assets

      - name: Typecheck
        run: npm run typecheck

      - name: Static tests
        run: npm run static:test

      - name: Build
        run: npm run build

      - name: Verify build hash embedded
        run: |
          if grep -q "local-dev" dist/assets/*.js 2>/dev/null; then
            echo "FAIL: 'local-dev' buildHash found in dist bundle — BUILD_HASH not injected"
            exit 1
          fi
          echo "OK: Build hash properly injected"

      - name: Upload CI evidence artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-evidence-node-${{ matrix.node-version }}-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            .tmp/*.json
            verification/*.json
          if-no-files-found: warn
          retention-days: 7

      - name: Upload failed build debug bundle
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failed-build-debug-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            dist/
            .tmp/
            verification/
            test-results/
            playwright-report/
          if-no-files-found: warn
          retention-days: 3

      - name: Configure GitHub Pages
        if: matrix.node-version == 20 && github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        if: matrix.node-version == 20 && github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  browser-smoke:
    name: Browser Smoke Test (Playwright)
    needs: verify
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run browser smoke test
        run: npm run browser:smoke

      - name: Assert runtime evidence
        run: node scripts/assert-runtime-evidence.mjs verification/runtime-evidence.json verification/browser-smoke.json

      - name: Upload browser smoke evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-smoke-evidence-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            verification/*.json
            verification/*.png
          if-no-files-found: warn
          retention-days: 7

      - name: Upload browser smoke failure report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: browser-smoke-failure-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: warn
          retention-days: 3

  deploy-pages:
    name: Deploy GitHub Pages
    needs: [verify, browser-smoke]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-windows:
    name: Verify (Windows, experimental)
    runs-on: windows-latest
    timeout-minutes: 15
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Static tests
        run: npm run static:test

      - name: Build
        run: npm run build
